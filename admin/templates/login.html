<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ArgusReach Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{background:#1a1f2e;border:1px solid #2d3448;border-radius:12px;padding:40px;width:360px}
h1{font-size:20px;font-weight:700;color:#fff;margin-bottom:4px}
.sub{color:#64748b;font-size:13px;margin-bottom:28px}
label{display:block;font-size:12px;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
input{width:100%;background:#13161f;border:1px solid #2d3448;border-radius:6px;padding:10px 12px;color:#e2e8f0;font-size:14px;margin-bottom:18px}
input:focus{outline:none;border-color:#3b82f6}
button{width:100%;background:#3b82f6;color:#fff;border:none;border-radius:6px;padding:11px;font-size:14px;font-weight:600;cursor:pointer}
button:hover{background:#2563eb}
.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444;padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:18px}
</style>
</head>
<body>
<div class="box">
  <h1>⚡ ArgusReach</h1>
  <p class="sub">Admin Portal — Internal Only</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <label>Password</label>
    <input type="password" name="password" autofocus placeholder="Enter admin password">
    <button type="submit">Sign In</button>
  </form>
</div>
</body>
</html>
